<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Student · Student Record Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a class="brand" href="index.html">
      <span class="brand-mark">SR</span>
      Student Record System
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="add-student.html">Add Student</a></li>
      <li><a href="view-students.html">View Students</a></li>
      <li><a href="search-student.html">Search</a></li>
      <li><a href="update-student.html" class="active">Update</a></li>
      <li><a href="delete-student.html">Delete</a></li>
    </ul>
  </div>
</nav>

<header class="page-header">
  <div class="container">
    <span class="eyebrow">Update</span>
    <h1>Update a student record</h1>
    <p>Look up a student by ID, edit the fields, then save. Maps to <code>updateStudent()</code> in the console app.</p>
  </div>
</header>

<main>
  <div class="container">
    <div class="card" style="max-width:760px;">

      <div class="search-bar" style="margin-bottom:0.4rem;">
        <input type="text" id="lookupInput" placeholder="Enter Student ID (e.g. STU104)">
        <button type="button" id="lookupBtn" class="btn btn-primary">Find Student</button>
      </div>

      <div id="lookupAlert" class="alert"></div>

      <form id="updateForm" style="display:none; margin-top:1.4rem;">
        <div class="form-grid">
          <div class="field">
            <label for="uId">Student ID</label>
            <input type="text" id="uId" name="uId" readonly>
          </div>
          <div class="field">
            <label for="uName">Full Name</label>
            <input type="text" id="uName" name="uName" required>
          </div>
          <div class="field">
            <label for="uAge">Age</label>
            <input type="number" id="uAge" name="uAge" min="15" max="80" required>
          </div>
          <div class="field">
            <label for="uCourse">Course</label>
            <select id="uCourse" name="uCourse" required>
              <option value="BCA">BCA</option>
              <option value="B.Sc CS">B.Sc Computer Science</option>
              <option value="B.Com">B.Com</option>
              <option value="B.E CSE">B.E Computer Science</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="uEmail">Email Address</label>
            <input type="email" id="uEmail" name="uEmail" required>
          </div>
          <div class="field">
            <label for="uPhone">Phone Number</label>
            <input type="tel" id="uPhone" name="uPhone" pattern="[0-9]{10}" required>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-update">Save Changes</button>
          <button type="button" id="cancelBtn" class="btn btn-outline">Cancel</button>
        </div>
      </form>

    </div>
  </div>
</main>

<footer>
  <div class="container">
    <span>Student Record Management System</span>
    <span>Phase 2 &middot; Frontend (HTML/CSS)</span>
  </div>
</footer>

<script src="js/students.js"></script>
<script>
  const lookupInput = document.getElementById("lookupInput");
  const lookupAlert = document.getElementById("lookupAlert");
  const updateForm = document.getElementById("updateForm");

  function loadIntoForm(s) {
    document.getElementById("uId").value = s.id;
    document.getElementById("uName").value = s.name;
    document.getElementById("uAge").value = s.age;
    document.getElementById("uCourse").value = s.course;
    document.getElementById("uEmail").value = s.email;
    document.getElementById("uPhone").value = s.phone;
    updateForm.style.display = "block";
  }

  function doLookup(id) {
    const found = findStudentById(SEED_STUDENTS, id);
    if (found) {
      showAlert(lookupAlert, "Record found for " + found.id + ". Edit the fields below and save.", "success");
      loadIntoForm(found);
    } else {
      showAlert(lookupAlert, "No student found with ID \"" + id + "\".", "error");
      updateForm.style.display = "none";
    }
  }

  document.getElementById("lookupBtn").addEventListener("click", function () {
    const id = lookupInput.value.trim();
    if (!id) {
      showAlert(lookupAlert, "Enter a Student ID first.", "error");
      return;
    }
    doLookup(id);
  });

  lookupInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") document.getElementById("lookupBtn").click();
  });

  document.getElementById("cancelBtn").addEventListener("click", function () {
    updateForm.style.display = "none";
    lookupAlert.className = "alert";
    lookupInput.value = "";
  });

  updateForm.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!updateForm.checkValidity()) {
      updateForm.reportValidity();
      return;
    }
    const id = document.getElementById("uId").value;
    showAlert(lookupAlert, "\u2713 Changes saved for " + id + " (demo only — connect to your Servlet in Phase 3 to persist).", "success");
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get("id")) {
    lookupInput.value = params.get("id");
    doLookup(params.get("id"));
  }
</script>

</body>
</html>
